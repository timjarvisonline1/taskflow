<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="/css/core.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/features.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="app" id="app">
    <div class="toast-wrap" id="toasts"></div>
    <div class="mob-overlay" id="mob-overlay" onclick="TF.closeMenu()"></div>
    <!-- Sidebar -->
    <nav class="side" id="sidebar">
      <div class="s-logo">
        <div class="s-logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg></div>
        <span class="s-logo-text">TaskFlow</span>
      </div>
      <!-- Add Task Button -->
      <div class="s-add-wrap">
        <button class="s-add-btn" onclick="TF.openAddModal()"><span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg> Add Task</span></button>
      </div>
      <div class="s-nav" id="s-nav"></div>
      <div class="s-active" id="s-active"></div>
      <div class="s-foot">
        <button class="s-btn" onclick="TF.load()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg> Refresh</button>
        <div style="font-size:10px;color:var(--t4);margin-top:8px;text-align:center;letter-spacing:0.02em" id="last-refresh"></div>
        <button class="s-btn" style="margin-top:8px;color:var(--red);border-color:rgba(255,51,88,0.15)" onclick="TF.signOut()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg> Sign Out</button>
      </div>
    </nav>
    <!-- Mobile Header -->
    <div class="mob">
      <span style="font-family:var(--fd);font-weight:700;font-size:16px;letter-spacing:-0.01em;color:var(--t1)">TaskFlow</span>
      <button class="mob-btn" onclick="TF.load()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg></button>
    </div>
    <!-- Main Content -->
    <main class="main" id="main"></main>
    <!-- Bottom Nav (mobile) — rebuilt dynamically by buildNav() -->
    <nav class="btm-nav" id="btm-nav"></nav>
    <!-- FAB (mobile) -->
    <button class="fab" id="fab" onclick="TF.openAddModal()">+</button>
    <!-- Detail/Edit Modal -->
    <div class="tf-modal-overlay" id="detail-modal" onclick="TF.closeModal()">
      <div class="tf-modal" onclick="event.stopPropagation()">
        <div id="detail-body"></div>
      </div>
    </div>
    <!-- Generic Modal (templates etc) -->
    <div class="tf-modal-overlay" id="modal" onclick="this.classList.remove('on')">
      <div class="tf-modal" onclick="event.stopPropagation()">
        <div id="m-body"></div>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="/js/config.js"></script>
  <script src="/js/core.js"></script>
  <script src="/js/views.js"></script>
  <script src="/js/modals.js"></script>
  <script src="/js/features.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
