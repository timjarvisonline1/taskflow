<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="/css/core.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/features.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="app" id="app">
    <div class="toast-wrap" id="toasts"></div>
    <div class="mob-overlay" id="mob-overlay" onclick="TF.closeMenu()"></div>
    <!-- Detail/Edit Modal — moved AFTER main content so it never blocks on mobile -->
    <!-- Generic Modal — moved AFTER main content so it never blocks on mobile -->
    <!-- Sidebar -->
    <nav class="side" id="sidebar">
      <div class="s-logo">
        <div class="s-logo-icon">⚡</div>
        <span class="s-logo-text">TaskFlow</span>
      </div>
      <!-- Add Task Button -->
      <div class="s-add-wrap">
        <button class="s-add-btn" onclick="TF.openAddModal()"><span>➕ Add Task</span></button>
      </div>
      <div class="s-nav" id="s-nav"></div>
      <div class="s-active" id="s-active"></div>
      <div class="s-foot">
        <button class="s-btn" onclick="TF.load()">🔄 Refresh Data</button>
        <div style="font-size:10px;color:var(--t4);margin-top:8px;text-align:center;letter-spacing:0.02em" id="last-refresh"></div>
        <button class="s-btn" style="margin-top:8px;color:var(--red);border-color:rgba(255,51,88,0.15)" onclick="TF.signOut()">🚪 Sign Out</button>
      </div>
    </nav>
    <!-- Mobile Header -->
    <div class="mob">
      <span style="font-family:var(--fd);font-weight:700;font-size:16px;letter-spacing:-0.01em;color:var(--t1)">TaskFlow</span>
      <button class="mob-btn" onclick="TF.load()">🔄</button>
    </div>
    <!-- Main Content -->
    <main class="main" id="main"></main>
    <!-- Bottom Nav (mobile) -->
    <nav class="btm-nav" id="btm-nav">
      <button class="btm-tab" data-v="overview" onclick="TF.nav('overview')">
        <span class="btm-ico">⚡</span><span class="btm-lbl">Today</span>
      </button>
      <button class="btm-tab" data-v="schedule" onclick="TF.nav('schedule')">
        <span class="btm-ico">📅</span><span class="btm-lbl">Schedule</span>
      </button>
      <button class="btm-tab" data-v="tasks" onclick="TF.nav('tasks')">
        <span class="btm-ico">📋</span><span class="btm-lbl">Tasks</span>
      </button>
      <button class="btm-tab" data-v="review" onclick="TF.nav('review')">
        <span class="btm-ico">📥</span><span class="btm-lbl">Review</span>
        <span class="btm-badge" id="btm-badge"></span>
      </button>
      <button class="btm-tab" data-v="more" onclick="TF.openMenu()">
        <span class="btm-ico">☰</span><span class="btm-lbl">More</span>
      </button>
    </nav>
    <!-- FAB (mobile) -->
    <button class="fab" id="fab" onclick="TF.openAddModal()">+</button>
    <!-- Detail/Edit Modal -->
    <div class="tf-modal-overlay" id="detail-modal" onclick="TF.closeModal()">
      <div class="tf-modal" onclick="event.stopPropagation()">
        <div id="detail-body"></div>
      </div>
    </div>
    <!-- Generic Modal (templates etc) -->
    <div class="tf-modal-overlay" id="modal" onclick="this.classList.remove('on')">
      <div class="tf-modal" onclick="event.stopPropagation()">
        <div id="m-body"></div>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="/js/config.js"></script>
  <script src="/js/core.js"></script>
  <script src="/js/views.js"></script>
  <script src="/js/modals.js"></script>
  <script src="/js/features.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
