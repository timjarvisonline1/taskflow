<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/core.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <style>
    body{min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-card{background:var(--bg2);border:1px solid var(--gborder);border-radius:12px;padding:48px 40px;width:100%;max-width:400px;box-shadow:var(--shadow-xl);text-align:center}
    .login-logo{width:56px;height:56px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px;box-shadow:none}
    .login-title{font-family:var(--fd);font-size:24px;font-weight:700;letter-spacing:-0.025em;color:var(--t1);margin-bottom:6px}
    .login-sub{font-size:13px;color:var(--t3);margin-bottom:32px;letter-spacing:0.01em}
    .login-field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;text-align:left}
    .login-field label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.7px;padding-left:2px}
    .login-field input{background:var(--bg3);border:1px solid var(--gborder);color:var(--t1);padding:12px 16px;border-radius:var(--rs);font-size:14px;font-family:var(--f);transition:all .25s;letter-spacing:0.01em;width:100%}
    .login-field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,0,153,0.12)}
    .login-btn{width:100%;padding:14px;background:var(--accent);border:none;color:#fff;border-radius:var(--rs);font-size:14px;font-weight:700;font-family:var(--f);cursor:pointer;letter-spacing:0.02em;margin-top:8px;transition:all .25s;box-shadow:0 4px 16px rgba(255,0,153,0.15)}
    .login-btn:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,0,153,0.2)}
    .login-btn:active{transform:translateY(0) scale(0.98)}
    .login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .login-error{color:var(--red);font-size:12px;margin-top:12px;min-height:18px;font-weight:500}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">⚡</div>
    <div class="login-title">TaskFlow</div>
    <div class="login-sub">Sign in to continue</div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="login-field">
        <label>Email</label>
        <input type="email" id="login-email" required autocomplete="email" autofocus>
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>

  <script>
    // Check if already logged in
    (async function() {
      var sess = await _sb.auth.getSession();
      if (sess.data.session) window.location.href = '/';
    })();

    async function handleLogin(e) {
      e.preventDefault();
      var btn = document.getElementById('login-btn');
      var err = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      err.textContent = '';

      var email = document.getElementById('login-email').value;
      var password = document.getElementById('login-password').value;

      var result = await _sb.auth.signInWithPassword({ email: email, password: password });
      if (result.error) {
        err.textContent = result.error.message;
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        window.location.href = '/';
      }
    }
  </script>
</body>
</html>
